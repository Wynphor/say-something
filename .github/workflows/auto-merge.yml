name: 壁报墙 - 自动合并

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # 只自动合并往 wall/ 目录提交的 PR
    if: >
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      contains(github.event.pull_request.title, 'wall/')
    steps:
      - name: 合并 PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // 检查文件变更是否都在 wall/ 目录下
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const allInWall = files.every(f => f.filename.startsWith('wall/'));

            if (!allInWall) {
              core.info('PR 包含 wall/ 目录外的文件，跳过自动合并');
              return;
            }

            // 尝试合并
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              core.info(`PR #${pr.number} 已自动合并`);

              // 添加标签
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['壁报墙', '已上墙'],
              });
            } catch (error) {
              core.warning(`自动合并失败: ${error.message}`);
            }
