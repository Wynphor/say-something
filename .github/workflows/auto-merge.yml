name: 壁报墙 - 自动合并

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref == github.event.repository.default_branch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 检查并合并 PR
        uses: actions/github-script@v7
        with:
          script: |
            const path = require('path');
            const { validateWallSubmission } = require(path.join(
              process.env.GITHUB_WORKSPACE,
              '.github/scripts/wall-submission-validator'
            ));

            const pr = context.payload.pull_request;

            // 检查文件变更是否都在 wall/ 目录下
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const validation = validateWallSubmission(files);
            if (!validation.valid) {
              core.info('PR 未通过 wall 投稿校验，跳过自动合并');
              for (const error of validation.errors) {
                core.info(error);
              }
              return;
            }

            // 尝试合并
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              core.info(`PR #${pr.number} 已自动合并`);

              // 添加标签
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['壁报墙', '已上墙'],
              });
            } catch (error) {
              core.warning(`自动合并失败: ${error.message}`);
            }
