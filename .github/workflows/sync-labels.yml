name: 同步标签

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/labels.json'
      - '.github/workflows/sync-labels.yml'

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 创建或更新标签
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const labels = JSON.parse(fs.readFileSync('.github/labels.json', 'utf8'));

            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existingNames = new Set(existing.map((label) => label.name));

            for (const label of labels) {
              if (existingNames.has(label.name)) {
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                core.info(`已更新标签: ${label.name}`);
              } else {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                core.info(`已创建标签: ${label.name}`);
              }
            }
