name: 精选上墙

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  move-to-wall:
    if: github.event.label.name == '精选'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 获取 Issue 内容并写入壁报墙
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // 确定目标目录
            const dirMap = {
              '心事': 'whisper',
              '故事': 'story',
              '遗憾': 'unsaid',
              '日常': 'daily',
              '感恩': 'gratitude',
              '摘录': 'archive',
            };

            const labels = issue.labels.map((label) => label.name);
            let dir = 'whisper';
            for (const [label, folder] of Object.entries(dirMap)) {
              if (labels.includes(label)) {
                dir = folder;
                break;
              }
            }

            // 从 Issue 内容提取正文（去掉模板提示注释）
            let body = issue.body || '';
            body = body.replace(/<!--[\s\S]*?-->/g, '').trim();

            // 生成文件名：标题-日期.md
            const date = new Date().toISOString().slice(0, 10);
            const safeTitle = issue.title
              .replace(/[\x00-\x1f\x7f]/g, '')
              .replace(/[\\/:*?"<>|]/g, '')
              .replace(/\s+/g, '-')
              .replace(/-+/g, '-')
              .replace(/^-|-$/g, '')
              .slice(0, 30) || '匿名';

            const wallDir = path.join('wall', dir);
            fs.mkdirSync(wallDir, { recursive: true });

            let filename = `${safeTitle}-${date}.md`;
            let filePath = path.join(wallDir, filename);
            if (fs.existsSync(filePath)) {
              filename = `${safeTitle}-${date}-issue-${issue.number}.md`;
              filePath = path.join(wallDir, filename);
            }

            const content = `# ${issue.title}\n\n${body}\n\n---\n*来自 [Issue #${issue.number}](${issue.html_url})，${date}*\n`;
            fs.writeFileSync(filePath, content, 'utf8');

            const relativePath = filePath.split(path.sep).join('/');
            const encodedPath = relativePath
              .split('/')
              .map((part) => encodeURIComponent(part))
              .join('/');
            const wallUrl = `${context.payload.repository.html_url}/blob/${context.payload.repository.default_branch}/${encodedPath}`;

            const commitTitle = issue.title
              .replace(/[\r\n]/g, ' ')
              .replace(/\s+/g, ' ')
              .trim()
              .slice(0, 50) || `Issue #${issue.number}`;

            core.setOutput('dir', dir);
            core.setOutput('filename', filename);
            core.setOutput('wall-url', wallUrl);
            core.setOutput('commit-title', commitTitle);

      - name: 提交并推送
        env:
          COMMIT_TITLE: ${{ steps.issue.outputs.commit-title }}
        run: |
          git config user.name "say-something-bot"
          git config user.email "bot@say-something.dev"
          git add wall/
          git diff --cached --quiet && exit 0
          git commit -m "📖 壁报墙上新：${COMMIT_TITLE}"
          git push

      - name: 标记已上墙
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['已上墙'],
              });
            } catch (error) {
              core.warning(`添加已上墙标签失败: ${error.message}`);
            }

      - name: 在 Issue 留言通知
        uses: actions/github-script@v7
        env:
          WALL_FILENAME: ${{ steps.issue.outputs.filename }}
          WALL_URL: ${{ steps.issue.outputs.wall-url }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `📖 这篇已经被搬到壁报墙了：\n\n[${process.env.WALL_FILENAME}](${process.env.WALL_URL})\n\n谢谢你的文字。`,
            });
